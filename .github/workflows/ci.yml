name: Full Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: pytest -m api --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-api
          path: allure-results/
          if-no-files-found: ignore

  ui-tests-safari:
    name: UI tests (Safari)
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enable Safari WebDriver
        run: |
          sudo safaridriver --enable || true
          /usr/bin/safaridriver --enable || true

      - name: Run UI tests in Safari
        env:
          BROWSER: safari
        run: pytest -m "smoke or regression"

      - name: Upload Safari screenshots if present
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: screenshots-safari
          path: screenshots/
          if-no-files-found: ignore

  ui-tests-chrome:
    name: UI tests (Chrome)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run UI tests in Chrome
        env:
          BROWSER: chrome
        run: pytest -m "smoke or regression" --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-ui-chrome
          path: allure-results/
          if-no-files-found: ignore

      - name: Upload Chrome screenshots if present
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: screenshots-chrome
          path: screenshots/
          if-no-files-found: ignore

  deploy-allure-report:
    name: Deploy Allure report
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests-chrome]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download API Allure results artifact
        uses: actions/download-artifact@v5
        with:
          name: allure-results-api
          path: downloaded-allure/api-results

      - name: Download Chrome Allure results artifact
        uses: actions/download-artifact@v5
        with:
          name: allure-results-ui-chrome
          path: downloaded-allure/ui-results

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Build Pages site
        run: |
          mkdir -p _site
          allure generate downloaded-allure/api-results --clean -o _site/api
          allure generate downloaded-allure/ui-results --clean -o _site/ui-chrome

          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Allure Reports</title>
            </head>
            <body>
              <h1>Allure Reports</h1>
              <ul>
                <li><a href="./api/">API Report</a></li>
                <li><a href="./ui-chrome/">UI Chrome Report</a></li>
              </ul>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
