[pytest]
addopts = -v --reruns 2 --reruns-delay 1
testpaths = tests
python_files = test_*.py
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
markers =
    smoke: smoke tests
    regression: regression tests
    api: api tests
